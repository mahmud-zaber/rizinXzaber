<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Between Us 💖</title>
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#0a0a0a,#1a0f1f); color:white; text-align:center; overflow:hidden; }
.container { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:20px; }
button { margin:10px; padding:12px 22px; border:none; border-radius:20px; background:linear-gradient(45deg,#ff6a88,#ff99ac); color:white; font-size:16px; cursor:pointer; transition:0.3s; }
button:hover { transform:scale(1.1); }
.fade { animation:fadeIn 1.2s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.glow { text-shadow:0 0 15px #ff6a88; }
.heart { position:absolute; color:#ff6a88; animation:float 6s linear infinite; }
@keyframes float { from{transform:translateY(100vh);opacity:1;} to{transform:translateY(-10vh);opacity:0;} }
</style>
</head>
<body>

<div class="container fade">
  <h1 id="text">Hey Rizin... 💖</h1>
  <div id="choices">
    <button onclick="next(1)">Start Something Special ✨</button>
  </div>
</div>

<script>
let stage = 0;
let pick = "";

function next(s){ stage=s; render(); }

function render(){
  const text = document.getElementById("text");
  const choices = document.getElementById("choices");
  choices.innerHTML="";

  // INTRO
  if(stage===1){
    text.innerHTML = "You discovered a small hidden world... made only for you, Rizin 🌸";
    choices.innerHTML = `<button onclick="next(2)">Enter 💫</button>`;
  }

  // CHOICE
  if(stage===2){
    text.innerHTML = "Before we begin... choose something that feels like us 💕";
    choices.innerHTML = `
      <button onclick="chooseItem('teddy')">Teddy 🧸</button>
      <button onclick="chooseItem('chocolate')">Chocolate 🍫</button>
      <button onclick="chooseItem('hug')">Hug 🤗</button>
    `;
  }

  // PERSONALIZED RESPONSE
  if(stage===3){
    if(pick==='teddy'){
      text.innerHTML = "You chose a teddy 🧸... I wish I could be that—always beside you, keeping you safe and warm 💖";
    }
    if(pick==='chocolate'){
      text.innerHTML = "Chocolate 🍫... sweet, just like every moment I spend thinking about you 💗";
    }
    if(pick==='hug'){
      text.innerHTML = "A hug 🤗... honestly, that's where I belong—with you, close and never letting go ❤️";
    }
    choices.innerHTML = `<button onclick="next(4)">Continue 💫</button>`;
  }

  // STORY BUILD
  if(stage===4){
    text.innerHTML = "If I were with you right now... what would you do?";
    choices.innerHTML = `
      <button onclick="next(5)">Smile at me 😊</button>
      <button onclick="next(5)">Hold me tight 🤍</button>
    `;
  }

  if(stage===5){
    text.innerHTML = "Sometimes I wonder... was it fate that brought us together? 🌌";
    choices.innerHTML = `
      <button onclick="next(6)">Yes 💖</button>
      <button onclick="next(6)">It had to be ✨</button>
    `;
  }

  // PROMISE
  if(stage===6){
    text.innerHTML = "Before I tell you something important... promise me one thing 🥺";
    choices.innerHTML = `<button onclick="next(7)">I promise</button>`;
  }

  // PASSWORD (SMOOTH)
  if(stage===7){
    text.innerHTML = "Type the word that means 'never ending' 💭";
    choices.innerHTML = `
      <input id='pass' placeholder='hint: forever' style='padding:10px;border-radius:10px;border:none;'>
      <br><button onclick='check()'>Unlock 💌</button>
    `;
  }

  // EMOTIONAL DROP
  if(stage===8){
    text.innerHTML = "Suddenly... everything feels quiet... like I disappeared...";
    choices.innerHTML = `<button onclick="next(9)">Zaber...?</button>`;
  }

  // RETURN
  if(stage===9){
    text.innerHTML = "I was never gone... not even for a moment 💗";
    choices.innerHTML = `<button onclick="next(10)">Continue</button>`;
  }

  // STORY CLIMAX
  if(stage===10){
    text.innerHTML = "No matter what happens... no matter where life takes us...";
    choices.innerHTML = `<button onclick="next(11)">Continue</button>`;
  }

  // FINAL CHOICE (INTERACTIVE ENDING)
  if(stage===11){
    text.innerHTML = "Will you stay with me in this story? 💖";
    choices.innerHTML = `
      <button onclick="ending1()">Stay 💕</button>
      <button onclick="ending2()">Always 🤍</button>
    `;
  }
}

function chooseItem(choice){
  pick = choice;
  stage = 3;
  render();
}

function check(){
  let val = document.getElementById("pass").value.toLowerCase();
  if(val.includes("forever")){
    stage=8; render();
  } else {
    alert("Hint: it's 'forever' 💖");
  }
}

// NORMAL ENDING
function ending1(){
  document.getElementById("text").innerHTML = `
    <h2 class='glow'>I will always be with you 💖</h2>
    <p>No matter what... you are my choice, Rizin 🌸</p>
    <p>- Zaber 🤍</p>
  `;
  document.getElementById("choices").innerHTML="";
}

// SECRET/STRONGER ENDING
function ending2(){
  document.getElementById("text").innerHTML = `
    <h2 class='glow'>Forever means you and me 💖</h2>
    <p>Again and again... in every world, I would choose you, Rizin 💗</p>
    <p>- Zaber 🤍</p>
  `;
  document.getElementById("choices").innerHTML="";
}

// HEART ANIMATION
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+10)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);
</script>

</body>
</html>
