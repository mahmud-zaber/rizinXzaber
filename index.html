<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Levels of Us ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url("22.avif");
    background-repeat: no-repeat;
    background-size: cover;
    text-align: center;
    font-size: 20px;
    color: black;
    text-align: center;
}

.container {
    padding: 30px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

.hidden {
    display: none;
}

h1 {
    color: black;
}

.progress {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<div id="start">
    <h1>💖 50 Levels of Us 💖</h1>
    <p>Happy 9 Months Anniversary Rizin ❤️</p>
    <button onclick="startGame()">Start Journey</button>
</div>

<div id="game" class="hidden">
    <h2 id="levelTitle"></h2>
    <p id="message"></p>
    <button onclick="nextLevel()">Next ➜</button>

    <div class="progress">
        <p id="progress"></p>
    </div>
</div>

<div id="end" class="hidden">
    <h1>🎉 LEVEL 50 COMPLETE 🎉</h1>
    <p>
        9 months with you...  
        and I still fall for you every single day.  
        You are my peace, my chaos, my everything.  
    </p>
    <h2>I Love You Rizin ❤️</h2>
    <h3>— Zaber</h3>
</div>

</div>

<script>
let level = 1;

const messages = [
"From the first moment... something felt different.",
"You slowly became my favorite person.",
"I started smiling more because of you.",
"You made ordinary days special.",
"I got addicted to talking to you.",
"You became my peace.",
"You became my chaos too 😌",
"I miss you even when we just talked.",
"You live in my thoughts.",
"I realized I care too much ❤️",

"You are my comfort.",
"I trust you more than anyone.",
"I feel safe with you.",
"I love your voice.",
"I love your smile.",
"I love your little things.",
"I love your anger too 😳",
"I love your craziness 🤪",
"I love everything about you.",
"You became my habit.",

"I don’t want to lose you.",
"I want you in my future.",
"I imagine us together.",
"You make me dream.",
"You make me strong.",
"You make me soft.",
"You understand me.",
"You complete me.",
"You changed me.",
"You made me better.",

"Distance can't break us.",
"I miss you more everyday.",
"I think about you at night.",
"I wish you were here.",
"I want to hold you.",
"I want to see you smile.",
"I want to be with you.",
"I want forever with you.",
"You are my home.",
"You are my world.",

"And today...",
"It’s our 9 months ❤️",
"And I still choose you.",
"Every single day.",
"No matter what happens...",
"I will stay.",
"I will fight for us.",
"I will love you endlessly.",
"You are mine ❤️",
"And I am yours."
];

function startGame() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    updateLevel();
}

function updateLevel() {
    document.getElementById("levelTitle").innerText = "Level " + level;
    document.getElementById("message").innerText = messages[level - 1];
    document.getElementById("progress").innerText = "Progress: " + level + "/50";
}

function nextLevel() {
    level++;
    if(level > 50) {
        document.getElementById("game").classList.add("hidden");
        document.getElementById("end").classList.remove("hidden");
    } else {
        updateLevel();
    }
}
</script>

</body>
</html>
